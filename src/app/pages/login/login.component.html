  <div class="container d-flex justify-content-center align-items-center vh-100">

        <div class="card shadow p-4" style="min-width: 350px; max-width: 400px; width: 100%;">

            <form (ngSubmit)="login()">

                <div class="d-flex align-items-center justify-content-center my-4 gap-2">

                    <img src="/image/My-tasks.png" alt="my-tasks" height="40">
                    <h3 class="mb-0">My-Tasks</h3>
                </div>

                <!-- Email -->
                <div class="mb-3">
                    <label class="form-label">E-mail</label>
                    <input
                        type="email"
                        name="email"
                        class="form-control"
                        placeholder="Digite seu email"
                        required
                        autocomplete="email"
                        [(ngModel)]="loginRequest.email">
                </div>

                <!-- Senha -->
                <div >
                    <label class="form-label">Senha</label>
                    <input
                        type="password"
                        name="password"
                        class="form-control"
                        placeholder="Digite sua senha"
                        required
                        autocomplete="current-password"
                        [(ngModel)]="loginRequest.password">
                </div>

                <div class="text-end mb-3">
                    <a routerLink="/forgot-password" class="small text-decoration-none">
                        Esqueceu a senha?
                    </a>
                </div>

                <!-- Botão Entrar -->
                <div class="d-grid my-3">
                    <button class="btn btn-success" 
                        type="submit" 
                        [disabled]="!loginRequest.email || !loginRequest.password || loading">
                        <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
                        {{ loading ? 'Entrando...' : 'Entrar' }}
                    </button>
                </div>

                <!-- Cadastro -->
                <div class="text-center mb-3">
                    <div class="text-center mb-3">
                        <span>Não tem conta?</span>
                        <a routerLink="/register" class="ms-1">
                            Cadastre-se
                        </a>
                    </div>
                </div>

                <!-- Esqueci senha -->
                <!-- <div class="text-center">
                    <a href="#" class="text-decoration-none link-dark">
                        Esqueci minha senha
                    </a>
                </div> -->

            </form>


        </div>

  </div>
